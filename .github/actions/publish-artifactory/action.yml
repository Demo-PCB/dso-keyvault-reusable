# =====================================================
# Composite Action: Publish to Artifactory
# =====================================================
# Uploads artifacts to JFrog Artifactory with build info.
#
# Prerequisites:
# - JFrog CLI configured with credentials
# =====================================================

name: 'Publish to Artifactory'
description: 'Upload artifacts to JFrog Artifactory'

inputs:
  artifact-file:
    description: 'Path to the artifact file to upload'
    required: true

  artifact-name:
    description: 'Name of the artifact'
    required: true

  version:
    description: 'Artifact version'
    required: true

  application:
    description: 'Application name'
    required: true

  component-name:
    description: 'Component name'
    required: true

  sha:
    description: 'Git commit SHA'
    required: true

  build-number:
    description: 'Build number'
    required: true

  artifactory-url:
    description: 'JFrog Artifactory URL'
    required: true

  artifactory-token:
    description: 'Artifactory token'
    required: true

outputs:
  artifact-path:
    description: 'Full Artifactory path to the uploaded artifact'
    value: ${{ steps.publish.outputs.artifact-path }}

runs:
  using: 'composite'
  steps:
    - name: Validate Artifactory configuration
      shell: bash
      run: |
        if [ -z "${{ inputs.artifactory-url }}" ] || [ -z "${{ inputs.artifactory-token }}" ]; then
          echo "::error::artifactory-url and artifactory-token inputs are required"
          exit 1
        fi

    - name: Setup JFrog CLI
      uses: jfrog/setup-jfrog-cli@v4
      env:
        JF_URL: ${{ inputs.artifactory-url }}
        JF_ACCESS_TOKEN: ${{ inputs.artifactory-token }}

    - name: Publish to Artifactory
      id: publish
      shell: bash
      run: |
        ARTIFACT_FILE="${{ inputs.artifact-file }}"
        ARTIFACT_NAME="${{ inputs.artifact-name }}"
        VERSION="${{ inputs.version }}"
        PREFIX=$(echo "${{ inputs.application }}" | tr '[:upper:]' '[:lower:]' | tr ' ' '-')
        
        # Define Artifactory repository path
        REPO_PATH="${PREFIX}-generic-snapshot/${{ inputs.component-name }}/${VERSION}"
        FULL_PATH="${REPO_PATH}/${ARTIFACT_NAME}.zip"
        
        echo "::group::Publishing to Artifactory"
        echo "Repository path: ${FULL_PATH}"
        
        # Upload artifact
        jf rt upload "${ARTIFACT_FILE}" "${FULL_PATH}" \
          --build-name="${{ inputs.application }}-keyvault" \
          --build-number="${{ inputs.build-number }}" \
          --props="version=${VERSION};application=${{ inputs.application }};component=${{ inputs.component-name }};sha=${{ inputs.sha }}"
        
        # Upload checksum if exists
        if [ -f "${ARTIFACT_FILE}.sha256" ]; then
          jf rt upload "${ARTIFACT_FILE}.sha256" "${REPO_PATH}/${ARTIFACT_NAME}.zip.sha256" \
            --build-name="${{ inputs.application }}-keyvault" \
            --build-number="${{ inputs.build-number }}"
        fi
        
        # Collect and publish build info
        jf rt build-collect-env "${{ inputs.application }}-keyvault" "${{ inputs.build-number }}"
        jf rt build-add-git "${{ inputs.application }}-keyvault" "${{ inputs.build-number }}" || true
        jf rt build-publish "${{ inputs.application }}-keyvault" "${{ inputs.build-number }}"
        
        echo "artifact-path=${FULL_PATH}" >> $GITHUB_OUTPUT
        echo "::notice::Artifact published to: ${FULL_PATH}"
        echo "::endgroup::"
