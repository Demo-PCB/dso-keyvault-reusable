name: Key Vault Dry Run
description: Preview Key Vault secret changes without modifying Azure

inputs:
  keyvault-name:
    description: Azure Key Vault name
    required: true
  data-file-path:
    description: Path to data.json
    required: true
  initial-secret-value:
    description: Initial value used for newly created secrets
    required: false
    default: DEMO
  environment:
    description: Target environment
    required: false
    default: dev

outputs:
  status:
    description: Dry run status
    value: ${{ steps.preview.outputs.status }}
  create-count:
    description: Secrets that would be created
    value: ${{ steps.preview.outputs.create-count }}
  skip-count:
    description: Secrets that would be skipped
    value: ${{ steps.preview.outputs.skip-count }}
  demo-count:
    description: Secrets that already have initial value
    value: ${{ steps.preview.outputs.demo-count }}

runs:
  using: composite
  steps:
    - name: Preview secret changes
      id: preview
      shell: bash
      run: |
        set -euo pipefail

        KEYVAULT_NAME='${{ inputs.keyvault-name }}'
        DATA_FILE='${{ inputs.data-file-path }}'
        INITIAL_VALUE='${{ inputs.initial-secret-value }}'

        CREATE_COUNT=0
        SKIP_COUNT=0
        DEMO_COUNT=0

        echo "## Key Vault dry run" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "| Secret | Action | Reason |" >> "$GITHUB_STEP_SUMMARY"
        echo "|---|---|---|" >> "$GITHUB_STEP_SUMMARY"

        while IFS= read -r SECRET_NAME; do
          if CURRENT_VALUE=$(az keyvault secret show --vault-name "$KEYVAULT_NAME" --name "$SECRET_NAME" --query value -o tsv 2>/dev/null); then
            if [ "$CURRENT_VALUE" = "$INITIAL_VALUE" ]; then
              echo "EXISTS_WITH_INITIAL_VALUE: $SECRET_NAME"
              echo "| $SECRET_NAME | NO_CHANGE | Existing value is $INITIAL_VALUE |" >> "$GITHUB_STEP_SUMMARY"
              DEMO_COUNT=$((DEMO_COUNT + 1))
            else
              echo "SKIP_PROTECTED_VALUE: $SECRET_NAME"
              echo "| $SECRET_NAME | SKIP | Existing value is different from $INITIAL_VALUE |" >> "$GITHUB_STEP_SUMMARY"
              SKIP_COUNT=$((SKIP_COUNT + 1))
            fi
          else
            echo "CREATE_WITH_INITIAL_VALUE: $SECRET_NAME"
            echo "| $SECRET_NAME | CREATE | Secret does not exist |" >> "$GITHUB_STEP_SUMMARY"
            CREATE_COUNT=$((CREATE_COUNT + 1))
          fi
        done < <(jq -r 'keys[]' "$DATA_FILE")

        echo "status=success" >> "$GITHUB_OUTPUT"
        echo "create-count=$CREATE_COUNT" >> "$GITHUB_OUTPUT"
        echo "skip-count=$SKIP_COUNT" >> "$GITHUB_OUTPUT"
        echo "demo-count=$DEMO_COUNT" >> "$GITHUB_OUTPUT"
