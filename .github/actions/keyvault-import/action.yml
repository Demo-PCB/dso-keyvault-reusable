name: Key Vault Import
description: Create missing Azure Key Vault secrets with DEMO and never overwrite real values

inputs:
  keyvault-name:
    description: Azure Key Vault name
    required: true
  data-file-path:
    description: Path to data.json
    required: true
  initial-secret-value:
    description: Initial value used for newly created secrets
    required: false
    default: DEMO

outputs:
  status:
    description: Import status
    value: ${{ steps.import.outputs.status }}
  created-count:
    description: Number of secrets created
    value: ${{ steps.import.outputs.created-count }}
  skipped-count:
    description: Number of secrets skipped because they already had real values
    value: ${{ steps.import.outputs.skipped-count }}
  demo-count:
    description: Number of existing secrets with initial value
    value: ${{ steps.import.outputs.demo-count }}
  keys-count:
    description: Total number of processed secret names
    value: ${{ steps.import.outputs.keys-count }}

runs:
  using: composite
  steps:
    - name: Create missing secrets safely
      id: import
      shell: bash
      run: |
        set -euo pipefail

        KEYVAULT_NAME='${{ inputs.keyvault-name }}'
        DATA_FILE='${{ inputs.data-file-path }}'
        INITIAL_VALUE='${{ inputs.initial-secret-value }}'

        CREATED_COUNT=0
        SKIPPED_COUNT=0
        DEMO_COUNT=0
        TOTAL_COUNT=0

        echo "## Key Vault import result" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "| Secret | Result | Details |" >> "$GITHUB_STEP_SUMMARY"
        echo "|---|---|---|" >> "$GITHUB_STEP_SUMMARY"

        while IFS= read -r SECRET_NAME; do
          TOTAL_COUNT=$((TOTAL_COUNT + 1))

          if CURRENT_VALUE=$(az keyvault secret show --vault-name "$KEYVAULT_NAME" --name "$SECRET_NAME" --query value -o tsv 2>/dev/null); then
            if [ "$CURRENT_VALUE" = "$INITIAL_VALUE" ]; then
              echo "Secret already exists with initial value. No update: $SECRET_NAME"
              echo "| $SECRET_NAME | NO_CHANGE | Existing value is $INITIAL_VALUE |" >> "$GITHUB_STEP_SUMMARY"
              DEMO_COUNT=$((DEMO_COUNT + 1))
            else
              echo "Secret exists with protected value. Skipping: $SECRET_NAME"
              echo "| $SECRET_NAME | SKIPPED | Existing value is different from $INITIAL_VALUE |" >> "$GITHUB_STEP_SUMMARY"
              SKIPPED_COUNT=$((SKIPPED_COUNT + 1))
            fi
          else
            echo "Creating missing secret with initial value: $SECRET_NAME"
            az keyvault secret set \
              --vault-name "$KEYVAULT_NAME" \
              --name "$SECRET_NAME" \
              --value "$INITIAL_VALUE" \
              --output none
            echo "| $SECRET_NAME | CREATED | Initial value assigned |" >> "$GITHUB_STEP_SUMMARY"
            CREATED_COUNT=$((CREATED_COUNT + 1))
          fi
        done < <(jq -r 'keys[]' "$DATA_FILE")

        echo "status=success" >> "$GITHUB_OUTPUT"
        echo "created-count=$CREATED_COUNT" >> "$GITHUB_OUTPUT"
        echo "skipped-count=$SKIPPED_COUNT" >> "$GITHUB_OUTPUT"
        echo "demo-count=$DEMO_COUNT" >> "$GITHUB_OUTPUT"
        echo "keys-count=$TOTAL_COUNT" >> "$GITHUB_OUTPUT"
