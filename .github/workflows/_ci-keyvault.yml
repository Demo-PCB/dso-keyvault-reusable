name: Reusable - Update Azure Key Vault Secrets

on:
  workflow_call:
    inputs:
      environment:
        description: 'Target environment from keyvault/config.yml. Example: dev, uat, prd'
        required: false
        type: string
        default: 'dev'
      data-file-path:
        description: 'Path to data.json in the caller repository'
        required: false
        type: string
        default: 'keyvault/data.json'
      config-file-path:
        description: 'Path to config.yml in the caller repository'
        required: false
        type: string
        default: 'keyvault/config.yml'
      initial-secret-value:
        description: 'Initial value for newly created secrets'
        required: false
        type: string
        default: 'DEMO'
      dry-run:
        description: 'Only preview changes. Does not create secrets.'
        required: false
        type: boolean
        default: false
    secrets:
      AZURE_CLIENT_ID:
        description: 'Azure App Registration client id for OIDC'
        required: true
      AZURE_TENANT_ID:
        description: 'Azure tenant id'
        required: true
      AZURE_SUBSCRIPTION_ID:
        description: 'Azure subscription id'
        required: true
    outputs:
      status:
        description: 'Execution status'
        value: ${{ jobs.update-keyvault.outputs.status }}
      keyvault-name:
        description: 'Target Key Vault name'
        value: ${{ jobs.update-keyvault.outputs.keyvault-name }}
      created-count:
        description: 'Number of secrets created'
        value: ${{ jobs.update-keyvault.outputs.created-count }}
      skipped-count:
        description: 'Number of secrets skipped because they already have real values'
        value: ${{ jobs.update-keyvault.outputs.skipped-count }}
      demo-count:
        description: 'Number of existing secrets that still have DEMO value'
        value: ${{ jobs.update-keyvault.outputs.demo-count }}

permissions:
  id-token: write
  contents: read

jobs:
  update-keyvault:
    name: Update Azure Key Vault
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.import.outputs.status }}
      keyvault-name: ${{ steps.config.outputs.keyvault-name }}
      created-count: ${{ steps.import.outputs.created-count }}
      skipped-count: ${{ steps.import.outputs.skipped-count }}
      demo-count: ${{ steps.import.outputs.demo-count }}

    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4

      - name: Validate input files
        shell: bash
        run: |
          set -euo pipefail

          DATA_FILE='${{ inputs.data-file-path }}'
          CONFIG_FILE='${{ inputs.config-file-path }}'

          if [ ! -f "$DATA_FILE" ]; then
            echo "::error::data.json not found at: $DATA_FILE"
            exit 1
          fi

          if [ ! -f "$CONFIG_FILE" ]; then
            echo "::error::config.yml not found at: $CONFIG_FILE"
            exit 1
          fi

          jq -e 'type == "object"' "$DATA_FILE" > /dev/null

          INVALID_NAMES=$(jq -r 'keys[] | select(test("^[A-Za-z0-9-]+$") | not)' "$DATA_FILE")
          if [ -n "$INVALID_NAMES" ]; then
            echo "::error::Invalid Key Vault secret names. Use only letters, numbers and hyphen (-). Invalid names:"
            echo "$INVALID_NAMES"
            exit 1
          fi

          KEY_COUNT=$(jq 'keys | length' "$DATA_FILE")
          if [ "$KEY_COUNT" -eq 0 ]; then
            echo "::error::data.json does not contain secrets"
            exit 1
          fi

          echo "::notice::Validated $KEY_COUNT secret name(s). Values in data.json will be ignored. New secrets will use '${{ inputs.initial-secret-value }}'."

      - name: Load environment configuration
        id: config
        shell: bash
        run: |
          set -euo pipefail

          CONFIG_FILE='${{ inputs.config-file-path }}'
          ENVIRONMENT='${{ inputs.environment }}'

          KEYVAULT_NAME=$(awk -v env="$ENVIRONMENT" '
            $0 ~ "^" env ":" { in_env=1; next }
            in_env && /^[A-Za-z0-9_-]+:/ { exit }
            in_env && $1 == "keyvault-name:" { print $2; exit }
            in_env && $1 == "resourceName:" { print $2; exit }
          ' "$CONFIG_FILE" | tr -d '"'"'"'')

          RESOURCE_GROUP=$(awk -v env="$ENVIRONMENT" '
            $0 ~ "^" env ":" { in_env=1; next }
            in_env && /^[A-Za-z0-9_-]+:/ { exit }
            in_env && $1 == "resource-group:" { print $2; exit }
          ' "$CONFIG_FILE" | tr -d '"'"'"'')

          if [ -z "$KEYVAULT_NAME" ]; then
            echo "::error::Missing '${ENVIRONMENT}.keyvault-name' in $CONFIG_FILE"
            exit 1
          fi

          echo "keyvault-name=$KEYVAULT_NAME" >> "$GITHUB_OUTPUT"
          echo "resource-group=$RESOURCE_GROUP" >> "$GITHUB_OUTPUT"

          echo "::notice::Target environment: $ENVIRONMENT"
          echo "::notice::Target Key Vault: $KEYVAULT_NAME"
          if [ -n "$RESOURCE_GROUP" ]; then
            echo "::notice::Resource Group: $RESOURCE_GROUP"
          fi

      - name: Azure login using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Key Vault access
        shell: bash
        run: |
          set -euo pipefail
          az keyvault show --name '${{ steps.config.outputs.keyvault-name }}' --query name -o tsv
          echo "::notice::Azure login and Key Vault lookup succeeded."

      - name: Dry run preview
        uses: Demo-PCB/dso-keyvault-reusable/.github/actions/keyvault-dry-run@main
        with:
          keyvault-name: ${{ steps.config.outputs.keyvault-name }}
          data-file-path: ${{ inputs.data-file-path }}
          initial-secret-value: ${{ inputs.initial-secret-value }}
          environment: ${{ inputs.environment }}

      - name: Create missing secrets safely
        id: import
        if: ${{ inputs.dry-run == false }}
        uses: Demo-PCB/dso-keyvault-reusable/.github/actions/keyvault-import@main
        with:
          keyvault-name: ${{ steps.config.outputs.keyvault-name }}
          data-file-path: ${{ inputs.data-file-path }}
          initial-secret-value: ${{ inputs.initial-secret-value }}

      - name: Dry-run only outputs
        id: dry_run_outputs
        if: ${{ inputs.dry-run == true }}
        shell: bash
        run: |
          echo "status=dry-run" >> "$GITHUB_OUTPUT"
          echo "created-count=0" >> "$GITHUB_OUTPUT"
          echo "skipped-count=0" >> "$GITHUB_OUTPUT"
          echo "demo-count=0" >> "$GITHUB_OUTPUT"

      - name: Job summary
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF_SUMMARY
          ## Azure Key Vault update

          | Property | Value |
          |---|---|
          | Environment | ${{ inputs.environment }} |
          | Key Vault | ${{ steps.config.outputs.keyvault-name }} |
          | Data file | ${{ inputs.data-file-path }} |
          | Initial value for new secrets | ${{ inputs.initial-secret-value }} |
          | Dry run | ${{ inputs.dry-run }} |

          Policy applied:
          - Missing secret: create with value `${{ inputs.initial-secret-value }}`.
          - Existing secret with value `${{ inputs.initial-secret-value }}`: keep as-is.
          - Existing secret with any other value: skip and do not create a new version.
          EOF_SUMMARY
